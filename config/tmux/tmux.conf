# =============================================================================
# tmux.conf — Persistent multi-agent session management
# Terminal: Ghostty (Catppuccin Mocha)
# Shell: zsh
# =============================================================================

# ---------------------------------------------------------------------------
# TERMINAL & COLOR
# ---------------------------------------------------------------------------

# Use 256-color terminal with truecolor support (Ghostty supports both)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides '*:Smulx=*'  # underscore style (kitty/ghostty)

# Set $TERM inside tmux to avoid scroll issues
set -g set-clipboard on

# ---------------------------------------------------------------------------
# PREFIX KEY
# ---------------------------------------------------------------------------

# Keep standard Ctrl+B — no conflict with Ghostty (cmd) or Aerospace (alt)
# Send prefix with: C-b
unbind C-b
set -g prefix C-b

# Allow sending Ctrl+B to apps by pressing it twice
bind C-b send-prefix

# ---------------------------------------------------------------------------
# MOUSE SUPPORT
# ---------------------------------------------------------------------------

set -g mouse on
set -g focus-events on

# ---------------------------------------------------------------------------
# HISTORY & SCROLLBACK
# ---------------------------------------------------------------------------

# 50000 lines — enough for long-running agent output
set -g history-limit 50000

# ---------------------------------------------------------------------------
# WINDOW & PANE NUMBERING
# ---------------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------------------------
# VI-STYLE NAVIGATION (copy mode + pane navigation)
# ---------------------------------------------------------------------------

setw -g mode-keys vi

# ---------------------------------------------------------------------------
# STATUS BAR — Catppuccin Mocha
# ---------------------------------------------------------------------------

# Mocha palette
set -g @mocha-base      "#1e1e2e"
set -g @mocha-mantle    "#181825"
set -g @mocha-crust     "#11111b"
set -g @mocha-surface0  "#313244"
set -g @mocha-surface1  "#45475a"
set -g @mocha-surface2  "#585b70"
set -g @mocha-overlay0  "#6c7086"
set -g @mocha-overlay1  "#7f849c"
set -g @mocha-overlay2  "#9399b2"
set -g @mocha-subtext0  "#a6adc8"
set -g @mocha-subtext1  "#bac2de"
set -g @mocha-text      "#cdd6f4"
set -g @mocha-lavender  "#b4befe"
set -g @mocha-blue      "#89b4fa"
set -g @mocha-sapphire  "#74c7ec"
set -g @mocha-sky       "#89dceb"
set -g @mocha-teal      "#94e2d5"
set -g @mocha-green     "#a6e3a1"
set -g @mocha-yellow    "#f9e2af"
set -g @mocha-peach     "#fab387"
set -g @mocha-maroon    "#eba0ac"
set -g @mocha-red       "#f38ba8"
set -g @mocha-mauve     "#cba6f7"
set -g @mocha-pink      "#f5c2e7"

# Update interval
set -g status-interval 5

# Position at bottom (clean — leaves top for Ghostty tabs)
set -g status-position bottom

# Status bar colors
set -g status-style "bg=#313244,fg=#cdd6f4"

# Left side: session name
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] #[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#313244]"
set -g status-left-length 60

# Right side: date/time + host
set -g status-right "#[fg=#cba6f7,bg=#313244]#[fg=#1e1e2e,bg=#cba6f7] #(whoami)@#H #[fg=#1e1e2e,bg=#89b4fa]  %Y-%m-%d %H:%M "
set -g status-right-length 80

# Window format (inactive)
setw -g window-status-format " #[fg=#6c7086]#I:#W#[fg=#6c7086] "
setw -g window-status-style "bg=#313244,fg=#6c7086"

# Window format (current/active)
setw -g window-status-current-format " #[fg=#1e1e2e,bg=#89b4fa,bold]#I:#W #[fg=#89b4fa,bg=#313244]"
setw -g window-status-current-style "bg=#313244,fg=#89b4fa"

# Window format (with bell/activity)
setw -g window-status-bell-style "bg=#313244,fg=#f38ba8"

# Window separator
setw -g window-status-separator ""

# Center-align the window list
set -g status-justify centre

# ---------------------------------------------------------------------------
# MESSAGES & COMMAND PROMPT
# ---------------------------------------------------------------------------

set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g display-time 2000

# ---------------------------------------------------------------------------
# PANE BORDERS
# ---------------------------------------------------------------------------

set -g pane-border-style "fg=#45475a,bg=#1e1e2e"
set -g pane-active-border-style "fg=#89b4fa,bg=#1e1e2e"

# Display pane numbers briefly when switching
set -g display-panes-time 1500
set -g display-panes-colour "#89b4fa"
set -g display-panes-active-colour "#f38ba8"

# ---------------------------------------------------------------------------
# KEY BINDINGS
# ---------------------------------------------------------------------------

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Splits --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"   # keep standard
bind '"' split-window -v -c "#{pane_current_path}"   # keep standard

# -- Vim-style pane navigation (prefix + h/j/k/l) --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Resize panes (prefix + H/J/K/L) --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
unbind L
bind -r L resize-pane -R 5

# -- Swap panes --
bind -r "<" swap-pane -D
bind -r ">" swap-pane -U

# -- Zoom pane (toggle full-screen for current pane) --
bind z resize-pane -Z

# -- Break pane to window / join pane --
bind ! break-pane
bind @ command-prompt -p "join pane from session:"  "join-pane -t '%%'"

# -- Session management --
bind s choose-session             # interactive session picker
bind S command-prompt "rename-session '%%'"
bind $ command-prompt "rename-session '%%'"   # keep standard too
bind w choose-window              # interactive window picker
bind , command-prompt "rename-window '%%'"
bind . command-prompt "move-window -t '%%'"

# -- Windows --
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind 0 select-window -t 10        # 0 goes to window 10 (since base-index=1)
bind -r Tab last-window           # Alt+Tab to toggle last window

# -- Kill --
bind x kill-pane
bind Q kill-window                # capital to confirm
bind q confirm-before -p "kill window #W? (y/n)" kill-window

# -- Copy mode (vi) --
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# -- Clipboard / Yank --
# Works with pbcopy on macOS (no xclip required)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# -- Quick new session (for spawning agent sessions) --
bind C new-session              # Ctrl+B, Ctrl+C → new session
bind = switch-client -l           # jump to last session (= for un-switch, symmetrical)

# -- Detach --
bind d detach-client

# -- Confirm before quitting --
bind -n M-Q confirm-before -p "kill tmux server? (y/n)" kill-server

# ---------------------------------------------------------------------------
# DEFAULT COMMAND
# ---------------------------------------------------------------------------

# Start with zsh, pass through TERM correctly
set -g default-command $SHELL
set -g default-shell $SHELL

# ---------------------------------------------------------------------------
# ESCAPE TIME
# ---------------------------------------------------------------------------

# Reduce escape-time for faster vim/nvim response
set -sg escape-time 10

# ---------------------------------------------------------------------------
# MISC
# ---------------------------------------------------------------------------

# Aggressively resize
setw -g aggressive-resize on

# UTF-8 is default in tmux 2.3+

# Enable activity monitoring (useful for agent sessions that produce output)
setw -g monitor-activity on
set -g visual-activity off

# Bell
set -g bell-action any
set -g visual-bell off

# Pane popup (tmux 3.2+)
bind M-m display-popup -w 80% -h 80%
